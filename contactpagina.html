<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GezondheidsAPI</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f3ec;
    --dark: #1a1a18;
    --sport: #2dbe6c;
    --voeding: #e8780c;
    --mentaal: #7b5ea7;
    --border: #e2ddd5;
    --muted: #8a8578;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    max-width: 600px;
    text-align: center;
    padding: 40px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 7vw, 60px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    font-weight: 300;
    margin-bottom: 48px;
    line-height: 1.6;
  }

  .button-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .category-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 32px 24px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .category-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
  }

  .category-btn .icon { font-size: 40px; }

  .btn-sport { border-color: var(--sport); background: #e8f9f0; }
  .btn-voeding { border-color: var(--voeding); background: #fef3e8; }
  .btn-mentaal { border-color: var(--mentaal); background: #f3eefb; }

  @media(max-width: 640px) {
    .container { padding: 20px; }
    h1 { margin-bottom: 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🏥 Gezondheids API</h1>
  <p class="subtitle">Ontdek contactgegevens voor sport, voeding en mentaal welzijn</p>

  <div class="button-grid">
    <a href="assets/contact-1.json" class="category-btn btn-sport">
      <span class="icon">🏃</span>
      <span>Sport</span>
    </a>
    <a href="assets/contact-2.json" class="category-btn btn-voeding">
      <span class="icon">🥦</span>
      <span>Voeding</span>
    </a>
    <a href="assets/contact-3.json" class="category-btn btn-mentaal">
      <span class="icon">🧘</span>
      <span>Mentaal</span>
    </a>
  </div>
</div>

</body>
</html>
